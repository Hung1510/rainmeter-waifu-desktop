[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Net
Information=Live download / upload speed. Uses Rainmeter's built-in NetIn / NetOut. No external app.
Version=1.0
License=MIT

[Variables]
@IncludeVariables=#@#Variables.inc

[MeasureNetIn]
Measure=NetIn

[MeasureNetOut]
Measure=NetOut

[MeterLabel]
Meter=String
X=0
Y=0
FontFace=#FontName#
FontSize=15
FontColor=#TextColor#
StringStyle=Bold
StringCase=Upper
AntiAlias=1
Text=NETWORK

[MeterDown]
Meter=String
MeasureName=MeasureNetIn
X=0
Y=4R
FontFace=#FontName#
FontSize=18
FontColor=#TextColor#
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text="DL  %1B/s"

[MeterUp]
Meter=String
MeasureName=MeasureNetOut
X=0
Y=2R
FontFace=#FontName#
FontSize=18
FontColor=#AccentColor#
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text="UL  %1B/s"
