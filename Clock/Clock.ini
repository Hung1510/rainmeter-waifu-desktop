[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock
Information=Minimal clock and date.
Version=1.0
License=MIT

[Variables]
@IncludeVariables=#@#Variables.inc

[MeasureTime]
Measure=Time
Format=%H:%M

[MeasureDate]
Measure=Time
Format=%A, %d %B %Y

[MeterTime]
Meter=String
MeasureName=MeasureTime
X=0
Y=0
FontFace=#FontName#
FontSize=72
FontColor=#TextColor#
StringStyle=Bold
AntiAlias=1
Text=%1

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=4
Y=-6R
FontFace=#FontName#
FontSize=15
FontColor=#AccentColor#
StringCase=Upper
AntiAlias=1
Text=%1
