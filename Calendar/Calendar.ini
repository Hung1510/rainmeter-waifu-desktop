[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Calendar
Information=Month grid with today highlighted. Lua
Version=1.0
License=MIT

[Variables]
@IncludeVariables=#@#Variables.inc
Today=0

[MeasureCalendar]
Measure=Script
ScriptFile=#@#calendar.lua
UpdateDivider=60

[MeterCalendar]
Meter=String
MeasureName=MeasureCalendar
X=0
Y=0
FontFace=Consolas
FontSize=15
FontColor=#TextColor#
AntiAlias=1
InlineSetting=Color | #AccentColor#
InlinePattern=(?<!\d)#Today#(?!\d)
DynamicVariables=1
Text=%1
